<section
  id="skills"
  class="skills"
  [class.inactive]="
    activeSection &&
    activeSection !== 'skills'
  "
  @fadeIn
>

  <div class="skills-container">

    <div class="section-header">

      <span class="section-subtitle">
        EXPERTISE
      </span>

      <h2>
        Mes compétences 🛠️
      </h2>

      <p>
        Technologies, frameworks,
        outils et expertises utilisés
        dans mes projets web,
        produit et no-code.
      </p>

    </div>

    <!-- STACKS -->

    <div
      class="skills-block"
      *ngFor="
        let type of
        objectKeys(stacksByType)
      "
    >

      <div class="block-header">

        <h3>
          {{ type }}
        </h3>

      </div>

      <div class="skills-grid">

        <div
          class="skill-card"
          *ngFor="
            let skill of
            stacksByType[type]
          "
        >

          <span class="skill-name">
            {{ skill.nom }}
          </span>

        </div>

      </div>

    </div>

    <!-- BUSINESS -->

    <div class="business-wrapper">

      <div class="block-header">

        <h2>
          Expertises digitales
        </h2>

      </div>

      <div
        class="skills-block"
        *ngFor="
          let category of
          objectKeys(
            businessSkillsByCategory
          )
        "
      >

        <h3 class="category-title">
          {{ category }}
        </h3>

        <div class="skills-grid">

          <div
            class="skill-card"
            *ngFor="
              let skill of
              businessSkillsByCategory[
                category
              ]
            "
          >

            <span class="skill-name">
              {{ skill.nom }}
            </span>

          </div>

        </div>

      </div>

    </div>

  </div>

</section>
