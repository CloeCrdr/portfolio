<section
  id="contact"
  class="contact"
  [class.inactive]="
    activeSection &&
    activeSection !== 'contact'
  "
  @fadeIn
>

  <div class="contact-container">

    <div class="contact-content">

      <span class="section-subtitle">
        CONTACT
      </span>

      <h2>
        Envie de collaborer ?
      </h2>

      <p>
        Projet web, automatisation,
        mission freelance, UX,
        développement ou simple échange :
        discutons-en.
      </p>

      <div class="contact-infos">

        <div class="info-card">

          <span class="info-label">
            EMAIL
          </span>

          <a href="mailto:cloe.cordeiro@outlook.fr">
            cloe.cordeiro&#64;outlook.fr
          </a>

        </div>

        <div class="info-card">

          <span class="info-label">
            LOCALISATION
          </span>

          <p>
            France • Remote Friendly
          </p>

        </div>

      </div>

    </div>

    <div class="contact-form-wrapper">

      <form
        class="contact-form"
        (submit)="onSubmit()"
        #contactForm="ngForm"
      >

        <div class="form-group">

          <label for="subject">
            Objet
          </label>

          <input
            type="text"
            name="subject"
            id="subject"
            [(ngModel)]="contact.subject"
            required
          >

        </div>

        <div class="form-row">

          <div class="form-group">

            <label for="name">
              Nom
            </label>

            <input
              type="text"
              id="name"
              [(ngModel)]="contact.name"
              name="name"
              required
            >

          </div>

          <div class="form-group">

            <label for="email">
              Email
            </label>

            <input
              type="email"
              id="email"
              [(ngModel)]="contact.email"
              name="email"
              required
            >

          </div>

        </div>

        <div class="form-group">

          <label for="message">
            Message
          </label>

          <textarea
            id="message"
            [(ngModel)]="contact.message"
            name="message"
            rows="6"
            required
          ></textarea>

        </div>

        <button
          type="submit"
          class="submit-btn"
        >
          Envoyer le message
        </button>

      </form>

    </div>

  </div>

</section>
