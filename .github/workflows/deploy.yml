name: CI and Deploy to AlwaysData

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Upload runtime files to AlwaysData
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          source: "dist/portfolio-cloe/browser,server/index.js,server/package.json,server/package-lock.json"
          target: "${{ secrets.SSH_TARGET_DIR }}"
          strip_components: 0
          debug: true

      - name: Install runtime dependencies on AlwaysData
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            set -e
            rm -rf "${{ secrets.SSH_TARGET_DIR }}/node_modules"
            mkdir -p "${{ secrets.SSH_TARGET_DIR }}/server"
            cd "${{ secrets.SSH_TARGET_DIR }}/server"
            rm -rf node_modules
            npm ci --omit=dev
